<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>N Body Problem</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <main>
      <canvas id="canvas"></canvas>
      <aside id="controlsContainer">
        <button id="toggleUI">Show Controls</button>
        <form id="controls" hidden>
          <fieldset>
            <legend>Simulation Options</legend>
            <div class="sim-control">
              <span class="sim-label">Speed:</span>
              <input
                type="range"
                id="dtInput"
                min="1"
                max="10"
                step="0.1"
                value="3"
                class="sim-slider"
              />
              <output id="dtValue" class="sim-value"></output>
            </div>
            <div class="sim-control">
              <span class="sim-label">Integrator:</span>
              <input
                type="range"
                id="integratorInput"
                min="1"
                max="3"
                step="1"
                value="2"
                class="sim-slider"
              />
              <output id="integratorValue" class="sim-value">Verlet</output>
            </div>
            <div class="button-container">
              <button type="button" id="resumeSimulation">Pause</button>
              <button type="button" id="restartSimulation">Restart</button>
            </div>
          </fieldset>

          <fieldset id="bodiesFieldset">
            <legend>Bodies Configuration</legend>
            <div class="preset-label-row">
              <span class="preset-label">Load Preset:</span>
              <select id="scenarioSelect" class="preset-select">
                <option value="">Custom</option>
              </select>
            </div>
            <section id="bodiesContainer">
              <!-- Dynamically populated body cards -->
            </section>
            <div class="button-container">
              <button type="button" id="addBodyBtn">+ Add Body</button>
              <button type="button" id="resetBodies">Reset to Scenario</button>
            </div>
          </fieldset>
        </form>
      </aside>
    </main>

    <script>
      // Get elements
      const $ = (selector) => document.querySelector(selector);
      const $$ = (selector) => document.querySelectorAll(selector);

      const toggleUIButton = $("#toggleUI");
      const controlsForm = $("#controls");

      // Toggle UI visibility
      toggleUIButton.addEventListener("click", () => {
        if (controlsForm.hasAttribute("hidden")) {
          controlsForm.removeAttribute("hidden");
          toggleUIButton.textContent = "Hide Controls";
        } else {
          controlsForm.setAttribute("hidden", "");
          toggleUIButton.textContent = "Show Controls";
        }
      });
    </script>
  </body>
</html>
